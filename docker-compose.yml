# Mirrors the Railway topology for on-prem / agency use: the same two
# artifacts, private networking only between app and vision, no outbound
# inference anywhere. First boot of `vision` downloads the pinned GGUF
# into the named volume; subsequent boots reuse it.
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      VISION_BASE_URL: http://vision:8080/v1
      DATA_DIR: /data
    volumes:
      - app-data:/data
    depends_on:
      - vision

  vision:
    # Pinned build: the mutable `:server` tag is a nightly and has shipped
    # heap-corruption crashes mid-request.
    image: ghcr.io/ggml-org/llama.cpp:server-b9570
    # llama-server has died with glibc heap corruption mid-batch (seen on
    # two builds/arches, always at a task boundary); restart so one crash
    # costs one read, not Tier B for the rest of the batch.
    restart: unless-stopped
    # No `ports:` on purpose — reachable only on the compose network.
    # One slot + small ctx: requests queue server-side instead of splitting
    # CPU; the app's VISION_WORKERS bounds them anyway. Image-token cap
    # bounds the (CPU-expensive) vision encode on large crops. Prompt cache
    # off: unique-image requests can never hit it, and both observed heap
    # crashes sat on its save/restore path. If you set a CPU limit on this
    # container, add `--threads <that limit>` — llama.cpp autodetects host
    # cores and thrashes a smaller quota.
    command: >
      -hf ggml-org/Qwen2.5-VL-3B-Instruct-GGUF:Q4_K_M
      --host 0.0.0.0 --port 8080
      --parallel 1 --ctx-size 8192 --image-max-tokens 512
      --cache-ram 0
    volumes:
      - llama-cache:/root/.cache/llama.cpp

volumes:
  app-data:
  llama-cache:
